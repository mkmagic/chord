name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Clang
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
            install_args: clang-18 libc++-18-dev libc++abi-18-dev
            build_type: Release
            enable_coverage: "OFF"
            coverage: false
          - name: Ubuntu GCC
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
            install_args: gcc-13 g++-13
            build_type: Release
            enable_coverage: "OFF"
            coverage: false
          - name: Ubuntu GCC Coverage
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
            install_args: gcc-13 g++-13 gcovr
            build_type: Debug
            enable_coverage: "ON"
            coverage: true
          - name: ARM Ubuntu Clang
            os: ubuntu-24.04-arm
            cc: clang-18
            cxx: clang++-18
            install_args: clang-18 libc++-18-dev libc++abi-18-dev
            build_type: Release
            enable_coverage: "OFF"
            coverage: false

    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build ${{ matrix.install_args }}

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCHORD_BUILD_TESTS=ON \
          -DENABLE_COVERAGE=${{ matrix.enable_coverage }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure --test-dir . --no-tests=error --output-junit test-results.xml

    - name: Generate coverage report
      if: matrix.coverage == true
      run: |
        gcovr \
          --root "${GITHUB_WORKSPACE}" \
          --xml-pretty \
          --output "${GITHUB_WORKSPACE}/build/coverage.xml" \
          --exclude "${GITHUB_WORKSPACE}/build/_deps/.*"

    - name: Upload coverage to Codecov
      if: matrix.coverage == true
      uses: codecov/codecov-action@v5
      with:
        files: ./build/coverage.xml
        fail_ci_if_error: true
        verbose: true

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "build/test-results.xml"
        check_name: "Test Results (${{ matrix.name }})"
