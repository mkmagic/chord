name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Clang
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
            install_args: clang-18 libc++-18-dev libc++abi-18-dev
            build_type: Release
          - name: Ubuntu GCC
            os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13
            install_args: gcc-13 g++-13
            build_type: Release
          - name: ARM Ubuntu Clang
            os: ubuntu-24.04-arm
            cc: clang-18
            cxx: clang++-18
            install_args: clang-18 libc++-18-dev libc++abi-18-dev
            build_type: Release

    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build ${{ matrix.install_args }}

    - name: Cache build dependencies
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.cmake_deps
        key: cmake-deps-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          cmake-deps-${{ matrix.os }}-${{ matrix.cc }}-

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCHORD_BUILD_TESTS=ON \
          -DFETCHCONTENT_BASE_DIR="${{ github.workspace }}/.cmake_deps" \
          -DFETCHCONTENT_UPDATES_DISCONNECTED=ON

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure --test-dir . --no-tests=error --output-junit test-results.xml

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "build/test-results.xml"
        check_name: "Test Results (${{ matrix.name }})"

  coverage:
    name: Coverage (Ubuntu GCC)
    needs: build_and_test
    runs-on: ubuntu-24.04

    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build gcc-13 g++-13 gcovr

    - name: Restore build dependencies cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ github.workspace }}/.cmake_deps
        key: cmake-deps-ubuntu-24.04-gcc-13-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          cmake-deps-ubuntu-24.04-gcc-13-

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-13 \
          -DCMAKE_C_COMPILER=gcc-13 \
          -DCHORD_BUILD_TESTS=ON \
          -DENABLE_COVERAGE=ON \
          -DFETCHCONTENT_BASE_DIR="${{ github.workspace }}/.cmake_deps" \
          -DFETCHCONTENT_UPDATES_DISCONNECTED=ON

    - name: Build
      run: cmake --build build

    - name: Generate coverage report
      run: |
        ctest --output-on-failure --test-dir build --no-tests=error
        gcovr \
          --root "${GITHUB_WORKSPACE}" \
          --xml-pretty \
          --output "${GITHUB_WORKSPACE}/build/coverage.xml" \
          --exclude-throw-branches \
          --exclude-unreachable-branches \
          --exclude-directories "${GITHUB_WORKSPACE}/.cmake_deps" \
          --exclude-directories "${GITHUB_WORKSPACE}/build/_deps" \
          --exclude-directories "${GITHUB_WORKSPACE}/tests"

    - name: Upload coverage to Codecov
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: codecov/codecov-action@v5
      with:
        files: ./build/coverage.xml
        disable_search: true
        fail_ci_if_error: true
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
